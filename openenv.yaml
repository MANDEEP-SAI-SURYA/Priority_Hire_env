name: priority_hire_env
description: Dynamic interview scheduling environment for priority-aware hiring batches.
entrypoint:
  module: priority_hire_env.env
  class: PriorityHireEnv
server:
  module: priority_hire_env.server
  app: app
models:
  observation: priority_hire_env.models.Observation
  action: priority_hire_env.models.ActionModel
  reward: priority_hire_env.models.RewardModel
# tasks:
#   - easy_critical_backend
#   - medium_scarce_ml_specialist
#   - hard_multi_tradeoff

tasks:
  - name: easy_critical_backend
    grader: priority_hire_env.graders.grade_easy_critical_backend
  - name: medium_scarce_ml_specialist
    grader: priority_hire_env.graders.grade_medium_scarce_ml_specialist
  - name: hard_multi_tradeoff
    grader: priority_hire_env.graders.grade_hard_multi_tradeoff
  - name: medium_deadline_pressure
    grader: priority_hire_env.graders.grade_medium_deadline_pressure
  - name: hard_conflicting_priorities
    grader: priority_hire_env.graders.grade_hard_conflicting_priorities
baselines:
  - fifo
  - priority_only
  - fit_only
  - priority_fit
inference_script: inference.py
